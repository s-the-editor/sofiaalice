<div class="overflow-x-hidden justify-center lg:ml-15 2xl:ml-50 lg:mr-15 2xl:mr-50">
    <br><br><br><br>
    <div class="center-mobile font-[Times_New_Roman]">
        <h1 class="text-5xl pl-2 pr-2">Reading</h1>
        <br>
    <h2 class="center-mobile text-2xl pl-5 pr-5">Book Recommendations</h2>
    <br>

    <div class="flex flex-row flex-wrap justify-center">
        @for (card of cards; track card.title) {
        <mat-card class="card" appearance="raised">
            <mat-card-header>
                <mat-card-title class="text-xl">{{ card.title }}</mat-card-title>
                <mat-card-subtitle>{{ card.subtitle }}</mat-card-subtitle>
            </mat-card-header>
                <br>
                <img mat-card-image class="image h-100" [src]="card.imageUrl" alt="Photo of {{ card.title }}">
                <mat-card-content>
                    <p class="text-lg">{{ card.content }}</p>
                </mat-card-content>
        <mat-card-footer class="card-footer">
            <mat-chip-set aria-label="Book Tags">
                <mat-chip>{{ card.genre }}</mat-chip>
                <mat-chip>{{ card.series }}</mat-chip>
            </mat-chip-set>
        </mat-card-footer>
        </mat-card>
    }

    </div>
